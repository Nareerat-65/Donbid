  <script src="/socket.io/socket.io.js"></script>
  
  <script>
    // ====== Socket.IO Real-time Auction ======
    const socket = io();

    function showAlertError(title, message, icon = "error") {
      Swal.fire({
        icon: icon,
        title: title,
        text: message,
        confirmButtonColor: "#3085d6",
        confirmButtonText: "ตกลง",
      });
    }


    // เมื่อมี bid ใหม่จาก server ให้ update UI
    socket.on("new bid", function (data) {
      if (data.productId === productId) {
        document.getElementById("highestBid").textContent = `฿${data.bidAmount}`;
        loadBidHistory(productId);
        updateQuickBidButtons(productId);
      }
    });
    const params = new URLSearchParams(window.location.search);
    const productId = params.get("id");

    let product = null;
    async function loadProductDetails() {
      try {
        const res = await fetch(`/api/products/${productId}`);
        product = await res.json();

        if (Array.isArray(product)) {
          product = product.length > 0 ? product[0] : null;
        }

        if (!product) {
          console.error("ไม่พบสินค้านี้");
          return;
        }
        const imagesContainer = document.getElementById("productImages");

        // render gallery
        const imageGallery = product.images?.length
          ? product.images
            .map(
              (img) =>
                `<img src="/uploads/${img}" alt="${product.name}" class="product-image">`
            )
            .join("")
          : `<img src="https://via.placeholder.com/300x150" alt="${product.name}" class="product-image">`;

        // set innerHTML
        imagesContainer.innerHTML = imageGallery;

        const productImages = document.querySelectorAll(".product-image");
        let currentIndex = 0;

        // ฟังก์ชันแสดงรูปตาม index
        function showImage(index) {
          productImages.forEach((img, i) => {
            img.style.display = i === index ? "block" : "none";
          });
        }

        // เริ่มต้นแสดงรูปแรก
        showImage(currentIndex);

        // ปุ่มลูกศรซ้ายขวา
        document.querySelector(".arrow.left").addEventListener("click", () => {
          currentIndex = (currentIndex - 1 + productImages.length) % productImages.length;
          showImage(currentIndex);
        });

        document.querySelector(".arrow.right").addEventListener("click", () => {
          currentIndex = (currentIndex + 1) % productImages.length;
          showImage(currentIndex);
        });
        // แสดงข้อมูลสินค้า
        console.log(product);
        document.getElementById("productName").textContent = product.name;
        document.getElementById("productPrice").textContent = `ราคาเริ่มต้น : ${product.start_price}`;
        document.getElementById("productCategory").textContent = `ประเภทของสินค้า: ${product.category || "-"}`;
        document.getElementById("productDescription").textContent = product.description || "-";
        document.getElementById("productSeller").textContent = `ผู้ขาย: ${product.seller_username}`;
        document.getElementById("productStartTime").textContent = `เวลาที่เริ่มต้น: ${new Date(product.start_time).toLocaleString()}`;
        document.getElementById("productEndTime").textContent = `เวลาที่สิ้นสุด: ${new Date(product.end_time).toLocaleString()}`;

        // เวลาที่เหลือ
        const timeElem = document.getElementById("productTimeRemaining");
        startCountdown(product.end_time, timeElem);
      } catch (err) {
        console.error("โหลดข้อมูลสินค้าไม่สำเร็จ", err);
      }
    }
    async function fetchWithTimeout(url,opt={},ms=5000){
      const c=new AbortController(); const t=setTimeout(()=>c.abort(),ms);
      try{ return await fetch(url,{...opt,signal:c.signal}); }
      finally{ clearTimeout(t); }
    }     


    async function loadHighestBid(productId) {
      try {
        const res = await fetchWithTimeout(`/api/bids/highest?product_id=${productId}`);
        const data = await res.json();
        document.getElementById(
          "highestBid"
        ).textContent = `฿${data.highest}`;
      } catch (err) {
        console.error("โหลดราคาสูงสุดล้มเหลว", err);
      }
    }

    function splitThaiText(text, maxLength = 50) {
      // 🔥 ลบ \n และ space ซ้ำ
      text = text.replace(/\s+/g, " ").trim();

      let sentences = text.split(/(?<=[ๆ,.!?…])/);
      let chunks = [];
      let buffer = "";

      for (let s of sentences) {
        if ((buffer + s).length > maxLength) {
          if (buffer.trim()) chunks.push(buffer.trim());
          buffer = s;
        } else {
          buffer += s;
        }
      }
      if (buffer.trim()) chunks.push(buffer.trim());

      return chunks;
    }

    let isSpeaking = false;
    let lastBlobUrl = null;            // ✅ ตัวชี้ blob ล่าสุด
    let currentAbortController = null;
    let lastSpeakTime = 0;

    async function playTTS(text) {
      if (!text || !text.trim()) return;
      const now = Date.now();
      if (now - lastSpeakTime < 300) await new Promise(r => setTimeout(r, 300));
      lastSpeakTime = Date.now();

      const audioElem = document.getElementById("ttsAudio");

      try {
        // 🔹 ถ้ามีเสียงก่อนหน้า → หยุดและล้างให้เกลี้ยง
        if (!audioElem.paused) {
          audioElem.pause();
          audioElem.currentTime = 0;
        }
        if (lastBlobUrl) {                 // ✅ ปล่อย resource เก่า (สำคัญมาก)
          URL.revokeObjectURL(lastBlobUrl);
          lastBlobUrl = null;
        }
        audioElem.removeAttribute("src");
        audioElem.load();

        if (currentAbortController) currentAbortController.abort();
        currentAbortController = new AbortController();
        const { signal } = currentAbortController;
        isSpeaking = true;

        // 🔹 ขอเสียงจาก API + ตั้ง timeout 8 วิ
        const timeoutId = setTimeout(() => currentAbortController.abort(), 8000);
        const res = await fetch("/api/ai/tts", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text }),
          signal
        });
        clearTimeout(timeoutId);

        if (!res.ok) throw new Error("TTS HTTP " + res.status);

        const arrayBuffer = await res.arrayBuffer();

        // 🔹 สร้าง blob ใหม่
        const blobUrl = URL.createObjectURL(new Blob([arrayBuffer], { type: "audio/mpeg" }));
        lastBlobUrl = blobUrl;             // ✅ เก็บไว้เพื่อ revoke ตอนจบ
        audioElem.src = blobUrl;

        // 🔹 เล่นเสียงใหม่ล่าสุด
        await audioElem.play().catch(err => console.warn("Autoplay blocked:", err));

        // 🔹 ล้าง resource เมื่อจบ/ผิดพลาด
        audioElem.onended = () => {
          isSpeaking = false;
          if (lastBlobUrl) { URL.revokeObjectURL(lastBlobUrl); lastBlobUrl = null; }
          audioElem.removeAttribute("src");
          audioElem.load();
        };
        audioElem.onerror = () => {
          isSpeaking = false;
          if (lastBlobUrl) { URL.revokeObjectURL(lastBlobUrl); lastBlobUrl = null; }
          audioElem.removeAttribute("src");
          audioElem.load();
        };

      } catch (err) {
        if (err.name === "AbortError") {
          console.log("🚫 ยกเลิกเสียงเก่าเรียบร้อย");
        } else {
          console.error("TTS Error:", err);
        }
      } finally {
        isSpeaking = false;
      }
    }

    // Debounce ข้อความ AI ที่มาถี่ๆ ให้พูดเฉพาะอันล่าสุด
    let speakTimer = null, pendingSpeakText = "";
    function scheduleSpeak(text) {
      pendingSpeakText = text;
      if (speakTimer) clearTimeout(speakTimer);
      speakTimer = setTimeout(() => { playTTS(pendingSpeakText); speakTimer = null; }, 700);
    }


    // ✅ ฟังก์ชันแสดงข้อความ AI
    function showAIMessage(msg) {
      const container = document.getElementById("ai-message");
      const bubble = document.createElement("div");
      bubble.classList.add("ai-bubble");
      bubble.textContent = msg;
      container.appendChild(bubble);

      // เลื่อนลงล่างสุดอัตโนมัติ
      container.scrollTop = container.scrollHeight;
    }

    async function loadAuctionLogs(productId) {
      try {
        const res = await fetch(`/api/ai/${productId}/logs`);
        const logs = await res.json();

        logs.forEach((log) => {
          showAIMessage(log.message);
        });
      } catch (err) {
        console.error("โหลดประวัติการสนทนาไม่สำเร็จ", err);
      }
    }

    function fetchAIMessage(prompt, fallbackMsg, productId, type = null) {
      fetch("/api/ai/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          message: prompt,
          product_id: productId,
          type,
        }),
      })
        .then((res) => res.json())
        .then((data) => {
          const msg = data.reply || fallbackMsg;
          showAIMessage(msg);
          scheduleSpeak(msg);
        })
        .catch((err) => {
          console.error("เกิดข้อผิดพลาดในการเรียก AI:", err);
          showAIMessage(fallbackMsg);
        });
    }

    // ตัวอย่าง: แสดงข้อความ AI เมื่อเปิดหน้า
    window.addEventListener("DOMContentLoaded", async () => {
      const urlParams = new URLSearchParams(window.location.search);
      const productId = urlParams.get("id");

      // โหลดประวัติการสนทนาเก่า
      if (productId) {
        loadAuctionLogs(productId);
      }
    });

    socket.on("ai message", ({ productId: pid, text }) => {
      if (pid === productId) {
        showAIMessage(text);
        scheduleSpeak(text);
      }
    });


    
    let active = 1; // เริ่มจาก video1

    function setVideoSmooth(src) {
      const current = document.getElementById("video" + active);
      const next = document.getElementById("video" + (active === 1 ? 2 : 1));

      next.src = src;
      next.load();
      next.onloadeddata = () => {
        next.play().catch(err => console.warn("Play blocked:", err));
        next.style.opacity = 1;     // fade in
        current.style.opacity = 0;  // fade out
        active = active === 1 ? 2 : 1;
      };
    }

    const audio = document.getElementById("ttsAudio");

    // เมื่อมีเสียง TTS → เปลี่ยนเป็น speak
    audio.addEventListener("play", () => {
      setVideoSmooth("./video/speak-edit.mp4");
    });

    // เมื่อเสียงจบ → กลับเป็น normal
    audio.addEventListener("ended", () => {
      setVideoSmooth("./video/normal-edit.mp4");
    });

    document.getElementById("customBidBtn").addEventListener("click", async () => {
      const token = localStorage.getItem("token");
      if (!token) {
        showAlertError("❗ ข้อผิดพลาด", "กรุณาเข้าสู่ระบบก่อน");
        return;
      }

      const bidInput = document.querySelector(".custom-bid input");
      const bidAmount = parseFloat(bidInput.value);
      if (isNaN(bidAmount) || bidAmount <= 0) {
        showAlertError("❗ ข้อผิดพลาด", "กรุณาใส่จำนวนเงินที่ถูกต้อง");
        return;
      }

      try {
        const res = await fetchWithTimeout("/api/bids", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${token}`,
          },
          body: JSON.stringify({
            product_id: productId,
            bid_price: bidAmount,
          }),
        });

        const data = await res.json();
        if (res.ok) {
          // ส่ง event ไป server เพื่อ broadcast ให้ทุก client
          const payload = parseJwt(token);
          socket.emit("bid placed", {
            productId,
            bidAmount,
            username:
              payload && payload.username ? payload.username : undefined,
          });
        } else {
          showAlertError("❗ ข้อผิดพลาด", data.message || "เกิดข้อผิดพลาดในการเสนอราคา");
        }
      } catch (err) {
        console.error("เกิดข้อผิดพลาดในการเสนอราคา:", err);
        showAlertError("❗ ข้อผิดพลาด", "ระบบขัดข้อง");
      }
    });

    async function updateQuickBidButtons(productId) {
      try {
        const res = await fetchWithTimeout(`/api/bids/highest?product_id=${productId}`);
        const data = await res.json();

        const currentPrice =
          data.highest ||
          parseFloat(
            document
              .getElementById("productPrice")
              .textContent.replace("฿", "")
          );

        const quickButtons = document.querySelectorAll(".quick-bid .btn-bid");
        const percents = [10, 20, 30]; // ปรับเปอร์เซนต์ตรงนี้

        quickButtons.forEach((btn, index) => {
          const percent = percents[index];
          const bid = Math.ceil(currentPrice * (1 + percent / 100));
          btn.textContent = bid;
          btn.dataset.bid = bid;
        });
      } catch (err) {
        console.error("อัปเดตปุ่ม Quick Bid ล้มเหลว", err);
      }
    }

    // เปิด-ปิด modal
    document.getElementById("openHistoryBtn").addEventListener("click", () => {
      document.getElementById("bidHistoryModal").style.display = "block";
      loadBidHistory(productId); // โหลดข้อมูลทุกครั้งที่เปิด
    });
    document.querySelector(".modal .close").addEventListener("click", () => {
      document.getElementById("bidHistoryModal").style.display = "none";
    });
    window.addEventListener("click", (e) => {
      const modal = document.getElementById("bidHistoryModal");
      if (e.target === modal) modal.style.display = "none";
    });

    async function loadBidHistory(productId) {
      try {
        const res = await fetchWithTimeout(`/api/bids/history?product_id=${productId}`);
        const data = await res.json();

        const list = document.getElementById("bidHistoryList");
        list.innerHTML = ""; // เคลียร์รายการก่อน

        data.forEach((bid) => {
          const li = document.createElement("li");
          li.style.marginBottom = "5px";
          li.textContent = `${bid.username} เสนอราคา ฿${bid.bid_price
            } เวลา ${formatDate(bid.created_at)}`;
          list.appendChild(li);
        });
      } catch (err) {
        console.error("โหลดประวัติการเสนอราคาไม่สำเร็จ", err);
      }
    }

    function formatDate(dateStr) {
      const date = new Date(dateStr);
      return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(
        date.getDate()
      )} ${pad(date.getHours())}:${pad(date.getMinutes())}`;
    }

    let auctionEnded = false; // ตัวแปรสถานะประมูลจบ
    function startCountdown(endTimeStr, element) {
      let called = false;
      let interval;
      let countdownActive = false;

      // 🚨 Soft Close Countdown
      async function updateCountdown(seconds, ExtendTime = false) {
        let timeLeft = seconds;
        countdownActive = true;
        element.textContent = `กำลังจะปิดใน ${timeLeft} วินาที`;

        clearInterval(interval); // กันซ้อน
        interval = setInterval(() => {
          timeLeft--;
          if (timeLeft > 0) {
            element.textContent = `กำลังจะปิดใน ${timeLeft} วินาที`;

            if (timeLeft === 6 && !isSpeaking) {
              showAIMessage("จะปิดประมูลแล้วนะคะ");
              document.getElementById("sound-close").play();
            } else if (timeLeft === 3 && !isSpeaking) {
              showAIMessage("3");
              document.getElementById("sound-3").play();
            } else if (timeLeft === 2 && !isSpeaking) {
              showAIMessage("2");
              document.getElementById("sound-2").play();
            } else if (timeLeft === 1 && !isSpeaking) {
              showAIMessage("1");
              document.getElementById("sound-1").play();
            }
            } else if (timeLeft === 0) {
              document.getElementById("Hammer").play();
            

          } else {
            clearInterval(interval);
            countdownActive = false;
            if (!called) {
              called = true;
              closeAuction(); // ปิดประมูลจริง
            }
          }
        }, 1000);
      }
      // 🏁 ปิดประมูลจริง
      async function closeAuction() {
        element.textContent = "หมดเวลาแล้ว";
        auctionEnded = true;        // ✅ ประกาศว่าจบแล้ว

        document.querySelectorAll(".btn-bid").forEach((btn) => {
          btn.disabled = true;
          btn.style.opacity = "0.5";
          btn.style.cursor = "not-allowed";
        });

        try {
          const token = localStorage.getItem("token");
          const payload = parseJwt(token); // token ของ user ปัจจุบัน
          const res = await fetch(`/api/products/close/${productId}`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              ...(token ? { Authorization: `Bearer ${token}` } : {}),
            },
          });
          const data = await res.json();

          console.log("DEBUG: closeAuction triggered", data);

          if (res.ok) {
            if (data.winner_user_id && data.final_price) {
              let winnerName = "";

              try {
                const resHistory = await fetchWithTimeout(
                  `/api/bids/history?product_id=${productId}`
                );
                const history = await resHistory.json();

                let winnerBid = history.find(
                  (bid) => Number(bid.bid_price) === Number(data.final_price)
                );
                if (!winnerBid && history.length > 0) {
                  winnerBid = history[0];
                }
                winnerName = winnerBid ? winnerBid.username : "";
              } catch (err) {
                console.error("Error fetching bid history:", err);
              }

              if (winnerName) {
                const winnerId = data.winner_user_id;
                const finalPrice = data.final_price;

                // ✅ ทุกคนได้ยิน AI ประกาศ
                const prompt = `ขอแสดงความยินดีกับ ${winnerName} ที่ชนะการประมูลในราคา ${finalPrice} บาท!`;
                fetchAIMessage(prompt, prompt, productId);

                // ✅ Popup เฉพาะผู้ชนะ
                if (payload && Number(payload.id) === Number(winnerId)) {
                  showWinnerPopup(
                    winnerName,
                    finalPrice,
                    `/confirm?winner=${winnerId}`
                  );
                }
              }
            } else {
              const fallbackMsg = data.message || "ไม่มีผู้ชนะการประมูล";
              fetchAIMessage(fallbackMsg, fallbackMsg, productId);
            }
          } else {
            const errMsg = data.message || "ปิดประมูลไม่สำเร็จ";
            fetchAIMessage(errMsg, errMsg, productId);
          }
          if (data.token) localStorage.setItem("token", data.token);
        } catch (err) {
          showAlertError("❗ ข้อผิดพลาด", "เกิดข้อผิดพลาดในการบันทึกผลการประมูล");
        }
      }

      // 🔄 ถ้ามี bid ใหม่ระหว่าง soft close → รีเซ็ตเวลา
      socket.on("auction endtime", ({ productId: pid, endTime, reason }) => {
         if (pid === productId && !called) {
          const now = Date.now();
          const secondsLeft = Math.max(0, Math.floor((endTime - now) / 1000));

          clearInterval(interval);
          updateCountdown(secondsLeft);

          // ✅ แค่ตอนต่อเวลาเท่านั้น
          if (reason === "bid-extend") {
            const msg = "มีผู้เสนอราคาเพิ่ม! ต่อเวลาอีก 60 วินาที";
            showAIMessage(msg);
          }
        }
      });
      const endTime = new Date(endTimeStr).getTime();
      const now = Date.now();
      const initialSeconds = Math.max(0, Math.floor((endTime - now) / 1000));
      updateCountdown(initialSeconds);
    }

    function showWinnerPopup(winnerName, finalPrice, confirmUrl) {
      // ถ้ามี popup เดิม ให้ลบออกก่อน
      const existingPopup = document.querySelector(".popup-overlay");
      if (existingPopup) existingPopup.remove();

      const popup = document.createElement("div");
      popup.classList.add("popup-overlay");
      popup.innerHTML = `
          <div class="popup">
              <div class="popup-content">
                  <h2>🎉 ขอแสดงความยินดี ${winnerName}!</h2>
                  <p>คุณชนะการประมูลในราคา <b>${finalPrice} บาท</b></p>
                  <button id="goHomeBtn">ไปยังหน้าหลัก</button>
                  <button id="goMyProductBtn">ไปยังหน้าสินค้าของคุณ</button>
              </div>
          </div>
      `;
      document.body.appendChild(popup);

      document.getElementById("goHomeBtn").addEventListener("click", () => {
        window.location.href = "/content/main-and-login.html";
      });
      document.getElementById("goMyProductBtn").addEventListener("click", () => {
          window.location.href = `../content/profile-check.html?page=myProducts`; //ปรับ URL ตามต้องการ
      });
    }

    function pad(n) {
      return n.toString().padStart(2, "0");
    }

    document.querySelectorAll(".quick-bid .btn-bid").forEach((btn) => {
      btn.addEventListener("click", () => {
        const bid = parseFloat(btn.dataset.bid);
        document.getElementById("customBid").value = bid; // แสดงในช่อง
        document.getElementById("customBidBtn").click(); // ส่ง bid เลย
      });
    });

    loadProductDetails();
    loadHighestBid(productId);
    updateQuickBidButtons(productId);
    loadBidHistory(productId);

    window.onload = async function () {
      try {
        const token = localStorage.getItem("token");

        // ถ้าไม่มี token → redirect ไป login
        if (!token) {
          showAlertError("❗ ข้อผิดพลาด", "กรุณาเข้าสู่ระบบก่อน");
          window.location.href = "/login/login.html";
          return;
        }

        // ดึงยอด coin จาก API
        const res = await fetch("/api/coins/balance", {
          headers: { Authorization: `Bearer ${token}` },
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.message || "เกิดข้อผิดพลาดในการดึงยอด coin");
        }

        // แสดง coin balance จาก server
        const coinSpan = document.getElementById("coinBalance");
        if (coinSpan) {
          coinSpan.textContent = Number(data.coin_balance).toFixed(2);
        }

        // อ่าน payload จาก JWT
        const payload = parseJwt(token);

        if (payload && payload.username) {
          // แสดงชื่อผู้ใช้
          const iconLink = document.querySelector(".personal-icon a");
          if (iconLink)
            iconLink.setAttribute("title", `คุณ ${payload.username}`);

          const nameSpan = document.getElementById("usernameDisplay");
          if (nameSpan) nameSpan.textContent = `คุณ ${payload.username}`;

          // ถ้า role เป็น seller → แสดงปุ่มเพิ่มสินค้า
          if (payload.role === "seller") {
            const addBtn = document.getElementById("addProductBtnContainer");
            if (addBtn) addBtn.style.display = "block";
          }
        } else {
          // token ไม่ถูกต้อง → ลบ token และ redirect
          showAlertError("❗ ข้อผิดพลาด", "Token ไม่ถูกต้อง");
          localStorage.removeItem("token");
          window.location.href = "/login/login.html";
          return;
        }

      } catch (err) {
        console.error("Error on window.onload:", err);
        showAlertError("❗ ข้อผิดพลาด", err.message || "เกิดข้อผิดพลาดในการโหลดข้อมูล โปรดลองใหม่");
        // ในกรณี error ร้ายแรง อาจ redirect ไป login
        // window.location.href = '/login/login.html';
      }
    };

    // ====== Socket.IO Join Auction ======
    socket.on("connect", () => {
      const token = localStorage.getItem("token");
      if (!token) return;

      const payload = parseJwt(token);
      if (!payload) return;

      // join ห้องประมูลนี้
      socket.emit("join auction", {
        productId,
        userId: payload.id,
        username: payload.username,
      });
    });

    // ฟังอัปเดตผู้เข้าร่วม
    socket.on("participants update", (data) => {
      if (data.productId !== productId) return;

      const countEl = document.querySelector(".participant-count .count");
      const avatarsEl = document.querySelector(".avatars");

      // แสดงจำนวนคน
      if (countEl) {
        countEl.innerText = data.participants.length;
      }

      // แสดง avatar (จำกัด 5 คนแรก + more)
      if (avatarsEl) {
        avatarsEl.innerHTML = "";
        data.participants.slice(0, 5).forEach((p, i) => {
          avatarsEl.innerHTML += `
              <div class="avatar">
                <img src="../pic/personal-icon.png?img=${i + 1}" />
                <span class="tooltip">${p.username}</span>
              </div>
            `;
        });
        if (data.participants.length > 5) {
          avatarsEl.innerHTML += `<span class="more" title="${data.participants.slice(5).map(p => p.username).join(', ')}">+${data.participants.length - 5}</span>`;
        }

      }
    });


    // ✅ เพิ่มฟังก์ชัน parseJwt
    function parseJwt(token) {
      try {
        const base64Url = token.split(".")[1];
        const base64 = base64Url.replace(/-/g, "+").replace(/_/g, "/");
        const jsonPayload = decodeURIComponent(
          atob(base64)
            .split("")
            .map(function (c) {
              return "%" + ("00" + c.charCodeAt(0).toString(16)).slice(-2);
            })
            .join("")
        );
        return JSON.parse(jsonPayload);
      } catch (e) {
        return null;
      }
    }
    
  </script>
